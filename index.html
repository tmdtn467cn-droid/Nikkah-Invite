<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A & S Invitation</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
    }

    #closed,
    #video {
      width: 100%;
      display: block;
    }

    #video {
      display: none;
    }
  </style>
</head>

<body>

  <img id="closed" src="closed.jpg.PGN" alt="Closed Invitation">

  <video id="video" controls playsinline>
    <source src="invite.mp4.MP4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script>
    const closed = document.getElementById("closed");
    const video = document.getElementById("video");

    closed.addEventListener("click", () => {
      closed.style.display = "none";
      video.style.display = "block";
      video.play();
    });
  </script>

</body>
</html>
