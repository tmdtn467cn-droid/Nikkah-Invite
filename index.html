<!DOCTYPE html>
<html>
<head>
<title>🤍 YOU’RE INVITED TO OUR NIKKAH 🤍</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    overflow: hidden;
    height: 100vh;
}

#cover, #videoContainer {
    width: 100%;
    height: 100vh;
}

#cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#videoContainer {
    display: none;
}

video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}
</style>

</head>

<body>

<div id="cover" onclick="openInvite()">
    <img src="closed.PNG" alt="Open Invitation">
</div>

<div id="videoContainer">
    <video id="inviteVideo" controls playsinline>
        <source src="invite.MP4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>


<script>
function openInvite() {

    document.getElementById("cover").style.display = "none";

    document.getElementById("videoContainer").style.display = "block";

    document.getElementById("inviteVideo").play();
}
</script>


</body>
</html>
