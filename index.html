<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A & S Invitation</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #fff;
}

#closed, #video {
  width: 100%;
  display: block;
  cursor: pointer;
}

#video {
  display: none;
}
</style>
</head>

<body>

<img id="closed" src="closed.jpg" alt="Closed Invitation">

<video id="video" controls autoplay playsinline muted>
<source src="invite.mp4.MP4" type="video/mp4">
</video>

<script>
document.getElementById("closed").addEventListener("click", function () {
  this.style.display = "none";
  const video = document.getElementById("video");
  video.style.display = "block";
  video.muted = false;
  video.play();
});
</script>

</body>
</html>
